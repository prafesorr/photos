name: Build Unsigned iOS IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Expo Prebuild (Generate iOS folder)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build App (Unsigned)
        env:
          RCT_NO_LAUNCH_PACKAGER: "1"
          NODE_BINARY: /usr/local/bin/node
        run: |
          cd ios
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Verify JS bundle exists
        run: |
          APP_PATH=$(find ios/build -name "*.app" -type d | head -n1)
          echo "App path: $APP_PATH"
          BUNDLE_PATH="$APP_PATH/main.jsbundle"
          if [ ! -f "$BUNDLE_PATH" ]; then
            echo "ОШИБКА: main.jsbundle не найден внутри .app!"
            ls -la "$APP_PATH"
            exit 1
          fi
          BUNDLE_SIZE=$(stat -f%z "$BUNDLE_PATH")
          echo "Размер бандла: $BUNDLE_SIZE байт"
          if [ "$BUNDLE_SIZE" -lt 10000 ]; then
            echo "ОШИБКА: main.jsbundle подозрительно маленький ($BUNDLE_SIZE байт) — похоже, бандлинг не сработал"
            exit 1
          fi
          echo "OK: бандл на месте, размер нормальный"

      - name: Package to .ipa
        run: |
          mkdir -p Payload
          APP_PATH=$(find ios/build -name "*.app" -type d | head -n1)
          cp -r "$APP_PATH" Payload/
          zip -r photos.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: photos-ipa
          path: photos.ipa
